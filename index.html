<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Maria Sinukuan: Vengeance of Arayat</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
<style>
    html, body {
        margin: 0;
        padding: 0;
        /* Force the root frame to lock onto the strict visible screen bounds */
        width: 100svw;
        height: 100svh;
        background-color: #111411;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: 'Courier New', Courier, monospace;
        overflow: hidden;
        touch-action: none;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
    }
    
    /* 🧩 THE CLAMPED VIEWPORT ENGINE */
    #game-container {
        position: relative;
        box-shadow: 0px 0px 25px rgba(0, 255, 64, 0.2);
        border: 4px solid #1b5e20;
        box-sizing: border-box;
        
        /* Enforce a rigid aspect ratio box */
        aspect-ratio: 16 / 9;
        
        /* Default: Try to fill the screen widthwise */
        width: 100svw;
        height: auto;
        
        /* 🛡️ THE CEILING: If the screen is ultra-wide (like an iPhone/Android landscape), 
            clamp the box to the exact height of the clear view area so it can NEVER spill downwards. */
        max-height: 100svh; 
        max-width: calc(100svh * 16 / 9);
    }

    /* 📱 PORTRAIT AUTO-ROTATE MATRIX: Keeps the game safely scaled if held vertically */
    @media screen and (max-width: 1024px) and (orientation: portrait) {
        #game-container {
            position: absolute !important;
            top: 50% !important;
            left: 50% !important;
            aspect-ratio: 16 / 9;
            
            /* Rotated landscape plane dimensions mapped cleanly to portrait limits */
            width: 100svh !important;   
            height: auto !important;  
            
            max-width: calc(100svw * 16 / 9) !important;
            max-height: 100svw !important;
            
            transform: translate(-50%, -50%) rotate(90deg) !important;
            transform-origin: center center !important;
        }
    }

    canvas {
        display: block;
        width: 100% !important;
        height: 100% !important;
        object-fit: contain;
    }

    /* 🖥️ DESKTOP HOVER START BUTTON ELEMENT STYLE */
    #btn-start-game {
        position: absolute;
        left: 50%;
        top: 66%;
        transform: translateX(-50%);
        width: 240px;
        height: 60px;
        background-color: #1b5e20;
        border: 3px solid #1b5e20;
        border-radius: 12px;
        color: #ffffff;
        font-family: 'Courier New', monospace;
        font-size: 22px;
        font-weight: bold;
        cursor: pointer;
        box-sizing: border-box;
        box-shadow: 0px 4px 10px rgba(0,0,0,0.5);
        z-index: 15;
        pointer-events: auto;
    }

    #btn-start-game:hover {
        background-color: #2e7d32;
        color: #a7ffeb;
    }

    /* MOBILE BUTTONS LAYER */
    .mobile-ui-layer {
        display: none;
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 10;
    }
    
    .touch-btn {
        position: absolute;
        background: rgba(34, 34, 34, 0.6);
        border: 3px solid #1b5e20;
        border-radius: 12px;
        color: #4caf50;
        display: flex;
        justify-content: center;
        align-items: center;
        font-weight: bold;
        font-family: 'Courier New', monospace;
        pointer-events: auto;
        touch-action: none;
        box-sizing: border-box;
    }
    
    .touch-btn:active {
        background: rgba(27, 94, 32, 0.6);
        color: #a7ffeb;
        border-color: #a7ffeb;
    }
    
    /* 📱 TOUCH SCREEN DEVICE CONDITIONAL RESPONSIVE MORPHS */
    @media (pointer: coarse) {
        .mobile-ui-layer {
            display: block;
        }

        /* Automates reshaping your native button layout to match the mobile touch layers */
        #btn-start-game {
            background: rgba(34, 34, 34, 0.6) !important;
            border: 3px solid #1b5e20 !important;
            color: #4caf50 !important;
            font-size: 18px !important;
            width: 160px !important;
            height: 60px !important;
            top: 65% !important;
        }
        
        #btn-start-game:active {
            background: rgba(27, 94, 32, 0.6) !important;
            color: #a7ffeb !important;
            border-color: #a7ffeb !important;
        }
    }
</style>

</head>

<body>
<div id="game-container">
    <button id="btn-start-game">START GAME</button>

    <div class="mobile-ui-layer">
        <div class="touch-btn" id="btn-left" style="left: 15px; bottom: 15px; width: 70px; height: 70px; font-size: 26px;">◀</div>
        <div class="touch-btn" id="btn-right" style="left: 105px; bottom: 15px; width: 70px; height: 70px; font-size: 26px;">▶</div>

        <div class="touch-btn" id="btn-jump" style="right: 205px; bottom: 15px; width: 75px; height: 70px; border-color: #a7ffeb; color: #ffffff; font-size: 14px;">JUMP</div>
        <div class="touch-btn" id="btn-attack" style="right: 105px; bottom: 15px; width: 85px; height: 75px; border-color: #ff5252; color: #ffffff; background: rgba(183,28,28,0.4); font-size: 14px;">ATTACK</div>
        <div class="touch-btn" id="btn-shift" style="right: 15px; bottom: 15px; width: 75px; height: 70px; border-color: #e040fb; color: #ffffff; font-size: 13px;">SHIFT</div>
        <div class="touch-btn" id="btn-super" style="right: 110px; bottom: 105px; width: 75px; height: 50px; border-color: #ffd54f; color: #ffffff; font-size: 12px;">WRATH</div>
    </div>
</div>

    <script>
        // --- 1. CORE CONFIGURATION ---
        const config = {
            type: Phaser.AUTO,
            scale: {
                mode: Phaser.Scale.FIT,
                parent: 'game-container',
                autoCenter: Phaser.Scale.CENTER_BOTH,
                width: 1024,
                height: 576
            },
            physics: {
                default: 'arcade',
                arcade: {
                    gravity: {
                        y: 900
                    },
                    debug: false
                }
            },
            render: {
                pixelArt: true,
                antialias: false
            }
        };

        // Global Variables
        let player;
        let platforms;
        let projectiles;
        let enemies;

        let currentWave = 1;
        let totalKills = 0;
        let wave2Kills = 0;
        const KILLS_TO_ADVANCE_WAVE_2 = 6;
        const KILLS_TO_ADVANCE_BOSS = 10;

        let canTransform = true;
        let shiftCooldownTimer = 0;

        let bossBody;
        let tankProjectiles;
        let bossHealth = 500;
        let bossMaxHealth = 500;
        let bossActive = false;
        let bossUIContainer;
        let bossFillBar;
        let bossCanTakeDamage = true;

        let currentForm = 'diwata';
        let wrath = 0;
        let isAttacking = false;
        let playerHealth = 100;
        let isDead = false;
        let isShifting = false;

        let uiText;
        let promptText;
        let bgMusic;

        let moveLeft = false;
        let moveRight = false;

        // --- 2. TITLE SCREEN SCENE ---
        class TitleScene extends Phaser.Scene {
    constructor() {
        super({
            key: 'TitleScene'
        });
    }
    preload() {
        this.load.image('arayat_bg', 'assets/images/Cartoon_Forest_BG_03.png');
    }
    create() {
        this.scale.refresh();
        this.add.image(512, 288, 'arayat_bg').setDisplaySize(1024, 576).setAlpha(0.6);

        // Pixel Style Hover Title
        let titleText = this.add.text(512, 180, 'MARIA SINUKUAN', {
            fontSize: '64px',
            fill: '#a7ffeb',
            fontStyle: 'bold',
            fontFamily: 'Courier New'
        }).setOrigin(0.5);
        titleText.setShadow(5, 5, '#000000', 0, true, true);

        let subtitleText = this.add.text(512, 250, 'Vengeance of Arayat', {
            fontSize: '28px',
            fill: '#81c784',
            fontStyle: 'italic',
            fontFamily: 'Courier New'
        }).setOrigin(0.5);
        subtitleText.setShadow(2, 2, '#000000', 0, true, true);

        this.tweens.add({
            targets: [titleText, subtitleText],
            y: '-=15',
            duration: 1800,
            yoyo: true,
            loop: -1,
            ease: 'Sine.easeInOut'
        });

        // 🛠️ CAPTURE AND ROUTE NATIVE BUTTON INTERACTIONS
        const startBtn = document.getElementById('btn-start-game');
        if (startBtn) startBtn.style.display = 'block'; // Ensure visibility holds during scenes resets

        const launchGameEngine = () => {
            if (startBtn) startBtn.style.display = 'none'; // Instantly dismiss button when scenes initialize
            if (this.sound.context.state === 'suspended') {
                this.sound.context.resume(); // Safely activates web browser audio manager threads
            }
            this.scene.start('GameScene');
        };

        if (startBtn) {
            // 📱 Mobile Touch Listener (Bypasses the 300ms click delay)
            startBtn.addEventListener('touchstart', (e) => {
                e.preventDefault(); 
                launchGameEngine();
            });

            // 🖥️ Desktop Mouse Click Listener
            startBtn.onclick = () => {
                launchGameEngine();
            };
        }
    }
}
        // --- 3. CORE GAMEPLAY SCENE ---
        class GameScene extends Phaser.Scene {
            constructor() {
                super({
                    key: 'GameScene'
                });
            }

            init() {
                this.input.keyboard.removeAllKeys();

                player = null;
                platforms = null;
                projectiles = null;
                enemies = null;
                currentWave = 1;
                totalKills = 0;
                wave2Kills = 0;
                canTransform = true;
                shiftCooldownTimer = 0;
                bossBody = null;
                tankProjectiles = null;
                bossHealth = 500;
                bossMaxHealth = 500;
                bossActive = false;
                bossUIContainer = null;
                bossFillBar = null;
                bossCanTakeDamage = true;
                currentForm = 'diwata';
                wrath = 0;
                isAttacking = false;
                playerHealth = 100;
                isDead = false;
                isShifting = false;

                moveRight = false;

                this.load.audio('snd_hurt', 'assets/audio/Bump.wav');
                this.load.audio('snd_die', 'assets/audio/Dead1.wav');
                this.load.audio('snd_boss_die', 'assets/audio/Explosion2.wav');
                // ==========================================

                let groundCanvas = document.createElement('canvas');
                groundCanvas.width = 32;
                groundCanvas.height = 32;
                let ctx = groundCanvas.getContext('2d');
                ctx.fillStyle = '#5d4037';
                ctx.fillRect(0, 0, 32, 32);
                ctx.fillStyle = '#4e342e';
                ctx.fillRect(4, 12, 4, 4);
                ctx.fillRect(16, 24, 4, 4);
                ctx.fillRect(24, 16, 4, 4);
                ctx.fillStyle = '#2e7d32';
                ctx.fillRect(0, 0, 32, 8);
                ctx.fillStyle = '#4caf50';
                ctx.fillRect(0, 0, 4, 4);
                ctx.fillRect(12, 0, 8, 4);
                ctx.fillRect(16, 4, 4, 4);
                ctx.fillStyle = '#2e7d32';
                ctx.fillRect(4, 8, 4, 4);
                ctx.fillRect(20, 8, 4, 4);
                this.textures.addCanvas('ground', groundCanvas);

                this.load.spritesheet('diwata_idle_sheet', 'assets/images/Woman_idle.png', {
                    frameWidth: 48,
                    frameHeight: 48
                });
                this.load.spritesheet('diwata_walk_sheet', 'assets/images/Woman_walk.png', {
                    frameWidth: 48,
                    frameHeight: 48
                });
                this.load.spritesheet('diwata_hurt_sheet', 'assets/images/Woman_hurt.png', {
                    frameWidth: 48,
                    frameHeight: 48
                });
                this.load.spritesheet('diwata_attack_sheet', 'assets/images/Woman_attack.png', {
                    frameWidth: 48,
                    frameHeight: 48
                });
                this.load.spritesheet('diwata_death_sheet', 'assets/images/Woman_death.png', {
                    frameWidth: 48,
                    frameHeight: 48
                });
                this.load.spritesheet('ermitanyo_idle_sheet', 'assets/images/Idle.png', {
                    frameWidth: 128,
                    frameHeight: 128
                });
                this.load.spritesheet('ermitanyo_walk_sheet', 'assets/images/Walk.png', {
                    frameWidth: 128,
                    frameHeight: 128
                });
                this.load.spritesheet('ermitanyo_hurt_sheet', 'assets/images/Hurt.png', {
                    frameWidth: 128,
                    frameHeight: 128
                });
                this.load.spritesheet('ermitanyo_attack_sheet', 'assets/images/Attack_2.png', {
                    frameWidth: 128,
                    frameHeight: 128
                });
                this.load.spritesheet('ermitanyo_death_sheet', 'assets/images/Dead.png', {
                    frameWidth: 128,
                    frameHeight: 128
                });
                this.load.spritesheet('projectile_sheet', 'assets/images/Charge_1.png', {
                    frameWidth: 64,
                    frameHeight: 128
                });
                this.load.spritesheet('fx_sheet', 'assets/images/effects.png', {
                    frameWidth: 32,
                    frameHeight: 32
                });
                this.load.spritesheet('graverobber_idle', 'assets/images/GraveRobber_idle.png', {
                    frameWidth: 48,
                    frameHeight: 48
                });
                this.load.spritesheet('graverobber_walk', 'assets/images/GraveRobber_walk.png', {
                    frameWidth: 48,
                    frameHeight: 48
                });
                this.load.spritesheet('graverobber_hurt', 'assets/images/GraveRobber_hurt.png', {
                    frameWidth: 48,
                    frameHeight: 48
                });
                this.load.spritesheet('graverobber_attack', 'assets/images/GraveRobber_attack2.png', {
                    frameWidth: 48,
                    frameHeight: 48
                });
                this.load.spritesheet('graverobber_death', 'assets/images/GraveRobber_death.png', {
                    frameWidth: 48,
                    frameHeight: 48
                });
                this.load.spritesheet('orc_idle', 'assets/images/orcIdle.png', {
                    frameWidth: 96,
                    frameHeight: 96
                });
                this.load.spritesheet('orc_walk', 'assets/images/orcWalk.png', {
                    frameWidth: 96,
                    frameHeight: 96
                });
                this.load.spritesheet('orc_hurt', 'assets/images/orcHurt.png', {
                    frameWidth: 96,
                    frameHeight: 96
                });
                this.load.spritesheet('orc_attack', 'assets/images/orcAttack_1.png', {
                    frameWidth: 96,

                });
                this.load.spritesheet('orc_death', 'assets/images/orcDead.png', {

                this.load.spritesheet('orc2_idle', 'assets/images/orc2Idle.png', {

                this.load.spritesheet('orc2_attack', 'assets/images/orc2Attack_1.png', {

                });
                this.load.spritesheet('orc2_death', 'assets/images/orc2Dead.png', {

                });
                this.load.spritesheet('orc2_walk', 'assets/images/orc2Walk.png', {

                });
                this.load.spritesheet('wolf_idle', 'assets/images/wolfIdle.png', {
                    frameWidth: 128,

                });
                this.load.spritesheet('wolf_walk', 'assets/images/wolfwalk.png', {
                    frameWidth: 128,
                    frameHeight: 128
                });
                this.load.spritesheet('wolf_hurt', 'assets/images/WolfHurt.png', {
                    frameWidth: 128,
                    frameHeight: 128
                });
                this.load.spritesheet('wolf_attack', 'assets/images/WolfAttack_1.png', {
                    frameWidth: 128,
                    frameHeight: 128
                });
                this.load.spritesheet('wolf_death', 'assets/images/wolfDead.png', {
                    frameWidth: 128,
                    frameHeight: 128
                });
                this.load.spritesheet('woodcutter_walk', 'assets/images/Woodcutter_walk.png', {
                    frameWidth: 48,
                    frameHeight: 48
                });
                this.load.spritesheet('woodcutter_hurt', 'assets/images/Woodcutter_hurt.png', {
                    frameWidth: 48,
                    frameHeight: 48
                });
                this.load.spritesheet('woodcutter_death', 'assets/images/Woodcutter_death.png', {
                    frameWidth: 48,
                    frameHeight: 48
                });
                this.load.spritesheet('woodcutter_attack', 'assets/images/Woodcutter_attack1.png', {
                    frameWidth: 48,
                    frameHeight: 48
                });
                this.load.spritesheet('boss_tank_body', 'assets/images/Tank1.png', {
                    frameWidth: 80,
                    frameHeight: 48
                });

                let shellCanvas = document.createElement('canvas');
                shellCanvas.width = 16;
                shellCanvas.height = 16;
                let shellCtx = shellCanvas.getContext('2d');
                shellCtx.fillStyle = '#37474f';
                shellCtx.beginPath();
                shellCtx.arc(8, 8, 8, 0, Math.PI * 2);
                shellCtx.fill();
                shellCtx.fillStyle = '#cfd8dc';
                shellCtx.beginPath();
                shellCtx.arc(5, 5, 2, 0, Math.PI * 2);
                shellCtx.fill();
                this.textures.addCanvas('tank_shell', shellCanvas);
            }

            create() {
                this.scale.refresh();
                this.add.image(512, 288, 'arayat_bg').setDisplaySize(1024, 576);
                this.bindMobileNavigationDOM();

                // 🔊 Start Background Music Safely
                try {
                    bgMusic = this.sound.add('snd_bgm', {
                        loop: true,
                        volume: 0.4
                    });
                    bgMusic.play();
                } catch (e) {
                    console.log("BGM file missing or skipped.");
                }

                platforms = this.physics.add.staticGroup();
                platforms.create(512, 544, 'ground').setDisplaySize(1024, 64).refreshBody();
                platforms.create(150, 370, 'ground').setDisplaySize(250, 24).refreshBody();
                platforms.create(874, 370, 'ground').setDisplaySize(250, 24).refreshBody();
                platforms.create(350, 230, 'ground').setDisplaySize(300, 24).refreshBody();
                platforms.create(674, 230, 'ground').setDisplaySize(300, 24).refreshBody();
                platforms.create(512, 100, 'ground').setDisplaySize(700, 24).refreshBody();

                player = this.physics.add.sprite(100, 468, 'diwata_idle_sheet').setScale(2);
                player.body.setSize(18, 44, false).setOffset(15, 4).setCollideWorldBounds(true);
                this.physics.add.collider(player, platforms);

                this.anims.create({
                    key: 'diwata_idle',
                    frames: this.anims.generateFrameNumbers('diwata_idle_sheet', {
                        start: 0,
                        end: 3
                    }),
                    frameRate: 6,
                    repeat: -1
                });
                this.anims.create({
                    key: 'diwata_walk',
                    frames: this.anims.generateFrameNumbers('diwata_walk_sheet', {
                        start: 0,
                        end: 5
                    }),
                    frameRate: 10,
                    repeat: -1
                });
                this.anims.create({
                    key: 'diwata_hurt',
                    frames: this.anims.generateFrameNumbers('diwata_hurt_sheet', {
                        start: 0,
                        end: 1
                    }),
                    frameRate: 10,
                    repeat: 0
                });
                this.anims.create({
                    key: 'diwata_attack',
                    frames: this.anims.generateFrameNumbers('diwata_attack_sheet', {

                        end: 3

                    frameRate: 15,
                    repeat: 0

                        start: 31,
                        end: 36
                    }),
                    frameRate: 20,
                    repeat: 0
                });
                this.anims.create({
                    key: 'graverobber_idle_key',
                    frames: this.anims.generateFrameNumbers('graverobber_idle', {

                    }),

                });
                this.anims.create({

                    frames: this.anims.generateFrameNumbers('graverobber_hurt', {

                    }),
                    frameRate: 10,
                    repeat: 0
                });
                this.anims.create({
                    key: 'graverobber_attack_key',
                    frames: this.anims.generateFrameNumbers('graverobber_attack', {
                        start: 0,
                        end: 5
                    }),
                    frameRate: 12,
                    repeat: 0
                });
                this.anims.create({
                    key: 'graverobber_death_key',
                    frames: this.anims.generateFrameNumbers('graverobber_death', {
                        start: 0,
                        end: 5
                    }),
                    frameRate: 8,
                    repeat: 0
                });
                this.anims.create({
                    key: 'orc_idle_key',
                    frames: this.anims.generateFrameNumbers('orc_idle', {
                        start: 0,
                        end: 4
                    }),
                    frameRate: 6,
                    repeat: -1
                });
                this.anims.create({
                    key: 'orc_walk_key',
                    frames: this.anims.generateFrameNumbers('orc_walk', {
                        start: 0,
                        end: 6
                    }),
                    frameRate: 8,
                    repeat: -1
                });
                this.anims.create({
                    key: 'orc_hurt_key',
                    frames: this.anims.generateFrameNumbers('orc_hurt', {
                        start: 0,
                        end: 1
                    }),
                    frameRate: 10,
                    repeat: 0
                });

            // 🔊 Helper function to safely play sounds
            playSound(key, volume = 0.5) {
                try {
                    this.sound.play(key, {

            bindMobileNavigationDOM() {
                const attachNode = (id, startFunc, endFunc) => {
                    const node = document.getElementById(id);
                    if (!node) return;
                    node.addEventListener('touchstart', (e) => {
                        e.preventDefault();
                        startFunc();
                    });
                    if (endFunc) {
                        node.addEventListener('touchend', (e) => {
                            e.preventDefault();
                            endFunc();
                        });
                        node.addEventListener('touchcancel', (e) => {
                            e.preventDefault();
                            endFunc();
                        });
                    }
                };
                attachNode('btn-left', () => {
                    moveLeft = true;
                }, () => {
                    moveLeft = false;
                });
                attachNode('btn-right', () => {
                    moveRight = true;
                }, () => {
                    moveRight = false;
                });
                attachNode('btn-jump', () => {
                    if (player && player.body && player.body.touching.down) {
                        player.body.setVelocityY(-620);
                    }
                });
                attachNode('btn-attack', () => {
                    this.processAttack(this);
                });
                attachNode('btn-shift', () => {
                    this.handleFormShift();
                });
                attachNode('btn-super', () => {
                    if (wrath >= 100) this.triggerVolcanicWrath(this);
                });
            }

            update() {
                if (!player || !player.body) return;
                if (isDead || isShifting || isAttacking) {
                    player.body.setVelocityX(0);
                    return;
                }

                if (this.cursors.left.isDown || this.keys.A.isDown || moveLeft) {
                    player.body.setVelocityX(-240);
                    player.flipX = true;
                    if (player.body.touching.down) player.anims.play(currentForm === 'diwata' ? 'diwata_walk' : 'ermitanyo_walk', true);
                } else if (this.cursors.right.isDown || this.keys.D.isDown || moveRight) {
                    player.body.setVelocityX(240);
                    player.flipX = false;
                    if (player.body.touching.down) player.anims.play(currentForm === 'diwata' ? 'diwata_walk' : 'ermitanyo_walk', true);
                } else {
                    player.body.setVelocityX(0);
                    if (player.body.touching.down) player.anims.play(currentForm === 'diwata' ? 'diwata_idle' : 'ermitanyo_idle', true);
                }

                if (currentForm === 'diwata') {
                    player.body.setSize(18, 44, false).setOffset(player.flipX ? 15 : 15, 4);
                } else {
                    player.body.setSize(32, 50, false).setOffset(player.flipX ? 48 : 48, 74);
                }

                if ((this.cursors.up.isDown || this.keys.W.isDown) && player.body.touching.down) {
                    player.body.setVelocityY(-620);
                }

                if (!player.body.touching.down) player.anims.play(currentForm === 'diwata' ? 'diwata_idle' : 'ermitanyo_idle', true);

                if (Phaser.Input.Keyboard.JustDown(this.keys.shift)) this.handleFormShift();
                if (Phaser.Input.Keyboard.JustDown(this.keys.attack)) this.processAttack(this);
                if (Phaser.Input.Keyboard.JustDown(this.keys.super) && wrath >= 100) this.triggerVolcanicWrath(this);

                this.processPatrols();
                this.updateBossPosition();
            }

            handleFormShift() {
                if (!canTransform || isShifting || isDead) {
                    uiText.setTint(0xffd54f);
                    this.time.delayedCall(150, () => uiText.clearTint());
                    return;
                }
                isShifting = true;
                canTransform = false;
                shiftCooldownTimer = 3.0;
                player.body.setVelocity(0, 0);

                this.time.addEvent({
                    delay: 100,
                    callback: () => {
                        shiftCooldownTimer = Math.max(0, shiftCooldownTimer - 0.1);
                        this.updateUI();
                        if (shiftCooldownTimer <= 0) canTransform = true;
                    },
                    repeat: 29
                });

                let burstX = player.x + (currentForm === 'diwata' ? (player.flipX ? 12 : -15) : (player.flipX ? 10 : -10));
                let burstY = player.y - (currentForm === 'diwata' ? 15 : -1);
                let magicBurst = this.add.sprite(burstX, burstY, 'fx_sheet').setScale(4).setDepth(10);
                magicBurst.anims.play('trans_burst');

                if (currentForm === 'diwata') {
                    currentForm = 'ermitanyo';
                    player.setTexture('ermitanyo_idle_sheet').setScale(1.10);
                    player.body.setSize(32, 50, false).setOffset(player.flipX ? 38 : 48, 74);
                    player.x += player.flipX ? 12 : -12;
                    player.y -= 15;
                    player.anims.play('ermitanyo_idle', true);
                } else {
                    currentForm = 'diwata';
                    player.setTexture('diwata_idle_sheet').setScale(2);
                    player.body.setSize(18, 44, false).setOffset(player.flipX ? 15 : 15, 4);
                    player.x += player.flipX ? -12 : 12;
                    player.y -= 14;
                    player.anims.play('diwata_idle', true);
                }
                this.physics.add.collider(player, platforms);
                this.updateUI();
                magicBurst.once('animationcomplete-trans_burst', () => {
                    magicBurst.destroy();
                    isShifting = false;
                });
            }

            spawnEnemy(x, y, type) {
                let textureMap = {
                    'graverobber': {
                        idle: 'graverobber_walk',
                        speed: -80,
                        scale: 2.0,
                        hp: 30,
                        sizeX: 20,
                        sizeY: 40,
                        offX: 14,
                        offY: 8,
                        anim: 'graverobber_walk_key'
                    },
                    'orc': {
                        idle: 'orc_walk',
                        speed: -50,
                        scale: 1.2,
                        hp: 50,
                        sizeX: 40,
                        sizeY: 60,
                        offX: 28,
                        offY: 36,
                        anim: 'orc_walk_key'
                    },
                    'orc2': {
                        idle: 'orc2_walk',
                        speed: -45,
                        scale: 1.2,
                        hp: 65,
                        sizeX: 40,
                        sizeY: 60,
                        offX: 28,
                        offY: 36,
                        anim: 'orc2_walk_key'
                    },
                    'wolf': {
                        idle: 'wolf_walk',
                        speed: -90,
                        scale: 1.0,
                        hp: 40,
                        sizeX: 70,
                        sizeY: 50,
                        offX: 29,
                        offY: 78,
                        anim: 'wolf_walk_key'
                    },
                    'woodcutter': {
                        idle: 'woodcutter_walk',
                        speed: -50,
                        scale: 2.0,
                        hp: 35,
                        sizeX: 20,
                        sizeY: 40,
                        offX: 14,
                        offY: 8,
                        anim: 'woodcutter_walk_key'
                    }
                };
                let data = textureMap[type];
                let e = enemies.create(x, y, data.idle).setCollideWorldBounds(true).setScale(data.scale);
                e.body.setVelocityX(data.speed);
                e.health = (currentWave === 2) ? Math.floor(data.hp * 1.5) : data.hp;
                e.typeId = type;
                e.patrolSpeed = Math.abs(data.speed);
                e.isHurt = false;
                e.body.setSize(data.sizeX, data.sizeY, false).setOffset(data.offX, data.offY);
                e.anims.play(data.anim, true);
                e.flipX = true;
            }

            processPatrols() {
                enemies.children.iterate((enemy) => {
                    if (!enemy || !enemy.body || enemy.isHurt) return;
                    let aiConfig = {
                        'graverobber': {
                            range: 350,
                            speedMod: 1.2
                        },
                        'orc': {
                            range: 250,
                            speedMod: 1.1
                        },
                        'orc2': {
                            range: 200,
                            speedMod: 1.0
                        },
                        'wolf': {
                            range: 400,
                            speedMod: 1.3
                        },
                        'woodcutter': {
                            range: 300,
                            speedMod: 1.1
                        }
                    };
                    let stats = aiConfig[enemy.typeId] || {
                        range: 300,
                        speedMod: 1.0
                    };
                    let distanceToPlayer = Phaser.Math.Distance.Between(enemy.x, enemy.y, player.x, player.y);
                    if (distanceToPlayer <= stats.range && !isDead && Math.abs(player.y - enemy.y) < 160) {
                        if (player.x < enemy.x) {
                            enemy.body.setVelocityX(-enemy.patrolSpeed * stats.speedMod);
                            enemy.flipX = true;
                        } else {
                            enemy.body.setVelocityX(enemy.patrolSpeed * stats.speedMod);
                            enemy.flipX = false;
                        }
                        return;
                    }
                    if (enemy.body.blocked.left || enemy.body.touching.left) {
                        enemy.body.setVelocityX(enemy.patrolSpeed);
                        enemy.flipX = false;
                    } else if (enemy.body.blocked.right || enemy.body.touching.right) {
                        enemy.body.setVelocityX(-enemy.patrolSpeed);
                        enemy.flipX = true;
                    }
                });
            }

            spawnBossTank(x, y) {
                bossActive = true;
                tankProjectiles = this.physics.add.group();
                bossBody = this.physics.add.sprite(x, y, 'boss_tank_body').setScale(3.5);
                bossBody.setCollideWorldBounds(true).body.setSize(70, 36, false).setOffset(5, 12);
                bossBody.health = bossHealth;
                bossBody.patrolSpeed = 40;
                bossBody.body.setVelocityX(-40);
                bossBody.anims.play('tank_treads_roll');
                this.physics.add.collider(bossBody, platforms);
                this.physics.add.overlap(projectiles, bossBody, this.damageBoss, null, this);
                this.physics.add.overlap(player, bossBody, this.hurtPlayer, null, this);
                this.physics.add.overlap(tankProjectiles, player, this.shellHitPlayer, null, this);
                this.createBossHealthBar();
                this.bossWeaponTimer = this.time.addEvent({
                    delay: 2500,
                    callback: this.bossFireCannon,
                    callbackScope: this,
                    loop: true
                });
            }

            updateBossPosition() {
                if (!bossActive || !bossBody.active) return;
                if (bossBody.body.blocked.left || bossBody.body.touching.left) {
                    bossBody.body.setVelocityX(bossBody.patrolSpeed);
                    bossBody.flipX = true;
                } else if (bossBody.body.blocked.right || bossBody.body.touching.right) {
                    bossBody.body.setVelocityX(-bossBody.patrolSpeed);
                    bossBody.flipX = false;
                }
            }

            bossFireCannon() {
                if (!bossActive || !bossBody.active || isDead) return;
                let shell = tankProjectiles.create(bossBody.x + (bossBody.flipX ? 50 : -50), bossBody.y, 'tank_shell');
                shell.body.allowGravity = true;
                shell.setScale(2.5).body.setCircle(8);
                shell.body.setVelocity((player.x - shell.x) * 1.3, -280);

                // 🔊 Tank Shoot
                this.playSound('snd_tank_shot', 0.6);
            }

            damageBoss(firstArg, secondArg) {
                if (!bossCanTakeDamage) return;
                let proj = (firstArg && firstArg.texture && firstArg.texture.key === 'projectile_sheet') ? firstArg : null;
                let actualBoss = (secondArg && secondArg.texture && secondArg.texture.key === 'boss_tank_body') ? secondArg : firstArg;
                if (proj && proj.active) proj.destroy();
                if (!actualBoss || !actualBoss.active) return;

                bossCanTakeDamage = false;
                bossHealth = Math.max(0, bossHealth - 10);
                actualBoss.setTint(0xff5252);
                this.playSound('snd_hurt', 0.5);

                this.time.delayedCall(200, () => {
                    if (actualBoss.active) actualBoss.clearTint();
                    bossCanTakeDamage = true;
                });
                this.drawBossHealthBar();

                if (bossHealth <= 0) {
                    bossActive = false;
                    bossBody.body.setVelocity(0, 0).enable = false;
                    if (this.bossWeaponTimer) this.bossWeaponTimer.destroy();
                    bossUIContainer.destroy();
                    this.cameras.main.shake(1500, 0.05);

                    // 🔊 Boss Death Explosion
                    this.playSound('snd_boss_die', 0.8);

                    this.displayWaveBanner("VICTORY! MOUNT ARAYAT IS SAVED", "#a7ffeb");
                    this.time.delayedCall(3500, () => {
                        bossBody.destroy();
                        if (bgMusic) bgMusic.stop();
                        this.scene.start('TitleScene');
                    });
                }
            }

            shellHitPlayer(playerRef, shellRef) {
                if (shellRef && shellRef.active) shellRef.destroy();
                this.hurtPlayer(playerRef, bossBody);
            }

            createBossHealthBar() {
                bossUIContainer = this.add.container(0, 95);
                let bg = this.add.rectangle(512, 40, 600, 20, 0x222222).setOrigin(0.5);
                let border = this.add.rectangle(512, 40, 604, 24).setOrigin(0.5).setStrokeStyle(2, 0x00ff40);
                let label = this.add.text(512, 18, "ANTI-FOREST COMBAT EXCAVATOR TANK", {
                    fontSize: '12px',
                    fill: '#00ff40',
                    fontStyle: 'bold'
                }).setOrigin(0.5);
                bossUIContainer.add([bg, border, label]);
                this.drawBossHealthBar();
            }

            drawBossHealthBar() {
                if (!bossActive) return;
                if (bossFillBar) bossFillBar.destroy();
                bossFillBar = this.add.rectangle(214, 40, (bossHealth / bossMaxHealth) * 596, 16, 0xff1744).setOrigin(0, 0.5);
                bossUIContainer.add(bossFillBar);
            }

            processAttack(scene) {
                if (isAttacking || isShifting || isDead) return;
                isAttacking = true;
                let direction = player.flipX ? -1 : 1;

                if (currentForm === 'diwata') {
                    // 🔊 Diwata Blaster Sound
                    this.playSound('snd_diwata_atk', 0.5);

                    player.anims.play('diwata_attack', true);
                    let burst = projectiles.create(player.x + (30 * direction), player.y, 'projectile_sheet');
                    if (burst && burst.body) {
                        burst.body.allowGravity = false;
                        burst.flipX = player.flipX;
                        burst.anims.play('magic_spin', true).body.setVelocityX(600 * direction);
                    }
                    scene.time.delayedCall(1200, () => {
                        if (burst && burst.active) burst.destroy();
                    });
                    scene.time.delayedCall(350, () => {
                        isAttacking = false;
                    });
                } else {
                    // 🔊 Ermitanyo Punch Sound
                    this.playSound('snd_ermitanyo_atk', 0.5);

                    player.anims.play('ermitanyo_attack', true);
                    let staffHitbox = scene.add.rectangle(player.x + (40 * direction), player.y, 60, 40, 0x8d6e63, 0);
                    scene.physics.add.existing(staffHitbox);
                    staffHitbox.body.allowGravity = false;
                    scene.physics.add.overlap(staffHitbox, enemies, (box, enemy) => {
                        this.strikeMelee(enemy, 20, direction, scene);
                    });
                    if (bossActive && bossBody && bossBody.active) {
                        scene.physics.add.overlap(staffHitbox, bossBody, (box, boss) => {
                            this.damageBoss(boss, null);
                        });
                    }
                    player.once('animationcomplete-ermitanyo_attack', () => {
                        staffHitbox.destroy();
                        isAttacking = false;
                    });
                }
            }

           hurtPlayer(playerRef, enemyRef) {
    if (isDead || isAttacking || isShifting || enemyRef.health <= 0) return;
    isAttacking = true;
    playerHealth = Math.max(0, playerHealth - 15);
    this.updateUI();

    // 🔊 Player Damage Sound
    this.playSound('snd_hurt', 0.5);

    if (enemyRef !== bossBody) {
        enemyRef.isHurt = true;
        enemyRef.body.setVelocityX(0);
        enemyRef.anims.play(`${enemyRef.typeId}_attack`, true);

        enemyRef.once('animationcomplete', () => {
            enemyRef.isHurt = false;
            if (enemyRef.active && enemyRef.health > 0) {
                enemyRef.body.setVelocityX(enemyRef.flipX ? enemyRef.patrolSpeed : -enemyRef.patrolSpeed);
                
                // 🛠️ ANIMATION RESTORATION LOOP: Pulls the enemy sprite assets completely out of its frozen frame
                enemyRef.anims.play(`${enemyRef.typeId}_walk`, true);
            }
        });
    }

    let knockbackDir = enemyRef.x > playerRef.x ? -200 : 200;
    playerRef.body.setVelocityX(knockbackDir);
    playerRef.body.setVelocityY(-200);

    playerRef.anims.play(currentForm === 'diwata' ? 'diwata_hurt' : 'ermitanyo_hurt', true).setTint(0xff5252);
    playerRef.once(currentForm === 'diwata' ? 'animationcomplete-diwata_hurt' : 'animationcomplete-ermitanyo_hurt', () => {
        playerRef.clearTint();
        isAttacking = false;
        if (playerHealth <= 0) this.triggerPlayerDeath();
    });
}
            triggerPlayerDeath() {
                isDead = true;
                player.body.setVelocity(0, 0);

                // 🔊 Player Death Sound
                this.playSound('snd_die', 0.6);

                player.anims.play(currentForm === 'diwata' ? 'diwata_death' : 'ermitanyo_death', true);
                if (bgMusic) bgMusic.stop();
                this.time.delayedCall(4000, () => {
                    this.scene.start('TitleScene');
                });
            }

            hitThreatRanged(projectile, enemy) {
                if (projectile && projectile.active) projectile.destroy();
                this.applyDamage(enemy, 10, this);
            }
            strikeMelee(enemy, amount, dir, scene) {
                enemy.body.setVelocityX(dir * 250);
                enemy.body.setVelocityY(-120);
                this.applyDamage(enemy, amount, scene);
            }

            applyDamage(enemy, amount, scene) {
                if (enemy.health <= 0) return;
                enemy.health -= amount;
                enemy.setTint(0xff5252);

                // 🔊 Enemy Hit Sound
                this.playSound('snd_hurt', 0.3);

                scene.time.delayedCall(100, () => {
                    if (enemy.active && enemy.health > 0) enemy.clearTint();
                });
                if (wrath < 100) {
                    wrath = Math.min(100, wrath + 3);
                    this.updateUI();
                }

                if (enemy.health <= 0) {
                    totalKills++;
                    if (currentWave === 2) wave2Kills++;
                    wrath = Math.min(100, wrath + 6);
                    this.updateUI();
                    enemy.isHurt = true;
                    enemy.body.setVelocity(0, 0).enable = false;

                    // 🔊 Enemy Death Sound
                    this.playSound('snd_die', 0.5);

                    enemy.anims.play(`${enemy.typeId}_death_key`, true).once('animationcomplete', () => {
                        enemy.destroy();
                        if (currentWave === 1 && totalKills >= KILLS_TO_ADVANCE_WAVE_2) {
                            currentWave = 2;
                            this.updateUI();
                            this.displayWaveBanner("WAVE 2: REBELS EMPOWERED", "#ffd54f");
                            scene.time.delayedCall(2500, () => {
                                if (currentWave === 2) {
                                    this.spawnEnemy(150, 300, 'wolf');
                                    this.spawnEnemy(874, 300, 'woodcutter');
                                    this.spawnEnemy(350, 160, 'orc');
                                    this.spawnEnemy(674, 160, 'graverobber');
                                    this.spawnEnemy(512, 450, 'orc2');
                                }
                            });
                        } else if (currentWave === 2 && wave2Kills >= KILLS_TO_ADVANCE_BOSS) {
                            currentWave = 3;
                            this.updateUI();
                            enemies.clear(true, true);
                            this.displayWaveBanner("FINAL BOSS ENCOUNTER", "#ff1744");
                            scene.time.delayedCall(2500, () => {
                                this.spawnBossTank(512, 400);
                            });
                        } else if (currentWave < 3) {
                            scene.time.delayedCall(2500, () => {
                                if (currentWave === 1 || (currentWave === 2 && wave2Kills < KILLS_TO_ADVANCE_BOSS)) this.spawnEnemy(Phaser.Math.Between(200, 900), 100, enemy.typeId);
                            });
                        }
                    });
                }
            }

            displayWaveBanner(message, colorHex) {
                let banner = this.add.text(512, 250, message, {
                    fontSize: '42px',
                    fill: colorHex,
                    fontStyle: 'bold',
                    fontFamily: 'Courier New',
                    stroke: '#000000',
                    strokeThickness: 6
                }).setOrigin(0.5).setDepth(20);
                this.tweens.add({
                    targets: banner,
                    alpha: {
                        start: 1,
                        to: 0
                    },
                    scale: {
                        start: 0.8,
                        to: 1.1
                    },
                    duration: 2500,
                    ease: 'Linear',
                    onComplete: () => banner.destroy()
                });
            }

            triggerVolcanicWrath(scene) {
                wrath = 0;
                this.updateUI();
                scene.cameras.main.shake(1200, 0.04);
                let eruptionOverlay = scene.add.rectangle(512, 288, 1024, 576, 0xff3d00, 0.7);
                scene.time.delayedCall(400, () => {
                    eruptionOverlay.destroy();
                });
                enemies.children.iterate((enemy) => {
                    if (enemy) this.applyDamage(enemy, 60, scene);
                });

                if (bossActive && bossBody && bossBody.active) this.damageBoss(bossBody, null);
            }

            updateUI() {
                let waveLabel = currentWave === 3 ? "FINAL BOSS" : `WAVE ${currentWave}`;
                let cdLabel = !canTransform ? ` [CD: ${shiftCooldownTimer.toFixed(1)}s]` : " [ALT READY]";
                let counterLabel = currentWave === 1 ? `KILLS: ${totalKills}/${KILLS_TO_ADVANCE_WAVE_2}` : (currentWave === 2 ? `WAVE 2 KILLS: ${wave2Kills}/${KILLS_TO_ADVANCE_BOSS}` : `TOTAL REBELS PURGED: ${totalKills}`);
                uiText.setText([
                    `MARIA SINUKUAN [HP: ${playerHealth}%] [FORM: ${currentForm.toUpperCase()}]${cdLabel}`,
                    `STAGE STATUS: [${waveLabel}] | ${counterLabel}`,
                    `METER: [${'█'.repeat(Math.floor(wrath/10))}${'░'.repeat(10 - Math.floor(wrath/10))}] ${wrath}% ${wrath >= 100 ? '⚡ WRATH READY (Q) ⚡' : ''}`
                ]);
            }
        }

        // --- 4. ENGINE BOOT INVOCATION ---
        config.scene = [TitleScene, GameScene];
        const game = new Phaser.Game(config);
    </script>

</body>
